<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHOOSY – Der Ausbildungs-Weg-Check | IKOBE</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ikobe-pink: #d63384;
  --ikobe-pink-light: #f0c0d8;
  --ikobe-pink-bg: #fdf2f7;
  --ikobe-gray: #555555;
  --ikobe-gray-light: #888888;
  --ikobe-gray-bg: #f5f5f5;
  --ikobe-white: #ffffff;
  --ikobe-black: #333333;
  --ikobe-bar-1: #f48fb1;
  --ikobe-bar-2: #8bc34a;
  --ikobe-bar-3: #9c27b0;
  --ikobe-bar-4: #ffb74d;
  --ikobe-bar-5: #29b6f6;
  --ikobe-bar-6: #4db6ac;
  --choosy-accent: #03a9f4;
  --choosy-accent-dark: #0288d1;
  --choosy-accent-light: #e1f5fe;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Open Sans',system-ui,-apple-system,sans-serif; font-size:16px; line-height:1.6; color:var(--ikobe-gray); background:var(--ikobe-gray-bg); }
.app-container { max-width:900px; margin:0 auto; background:var(--ikobe-white); min-height:100vh; box-shadow:0 0 40px rgba(0,0,0,0.08); }
.app-header { position:sticky; top:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:12px 32px; background:var(--ikobe-white); border-bottom:1px solid #eee; }
.ikobe-logo { display:flex; align-items:center; }
.logo-img { height:36px; width:auto; }
.header-url { color:var(--ikobe-gray-light); font-size:13px; }
.content { padding:30px 40px; }
@media(max-width:600px){.content{padding:20px;}}
.page { animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* Hero */
.hero { text-align:center; padding:40px 20px; }
.hero-badge { display:inline-block; background:var(--choosy-accent-light); color:var(--choosy-accent-dark); padding:6px 18px; border-radius:20px; font-size:13px; font-weight:600; margin-bottom:20px; }
.hero h1 { font-size:32px; font-weight:700; color:var(--ikobe-black); margin-bottom:4px; line-height:1.2; }
.hero h1 span { color:var(--choosy-accent); }
.hero .subtitle { font-size:18px; color:var(--choosy-accent); font-weight:600; margin-bottom:16px; }
.hero .tagline { color:var(--ikobe-gray); font-size:15px; margin-bottom:24px; max-width:560px; margin-left:auto; margin-right:auto; }
.hero-arrows { display:flex; justify-content:center; gap:24px; margin:28px 0; flex-wrap:wrap; }
.hero-path { background:var(--ikobe-white); border:2px solid #eee; border-radius:16px; padding:20px 16px; width:160px; text-align:center; transition:all 0.3s; }
.hero-path:hover { border-color:var(--choosy-accent); transform:translateY(-4px); box-shadow:0 8px 24px rgba(3,169,244,0.15); }
.hero-path .path-icon { font-size:36px; margin-bottom:8px; }
.hero-path .path-label { font-weight:600; color:var(--ikobe-black); font-size:14px; }
.meta-info { display:flex; justify-content:center; gap:24px; margin:24px 0; font-size:14px; color:var(--ikobe-gray-light); }
.meta-info span { display:flex; align-items:center; gap:6px; }
.intro-text { text-align:left; max-width:700px; margin:20px auto 0; font-size:14px; color:var(--ikobe-gray); line-height:1.7; }
.intro-text p { margin-bottom:12px; }
.intro-text strong { color:var(--ikobe-black); }

/* Buttons */
.btn-primary { background:var(--ikobe-pink); color:white; border:none; padding:14px 40px; font-size:16px; font-weight:600; border-radius:8px; cursor:pointer; transition:all 0.3s; font-family:inherit; }
.btn-primary:hover { background:#b82870; transform:translateY(-2px); box-shadow:0 6px 20px rgba(214,51,132,0.3); }
.btn-secondary { background:white; color:var(--ikobe-pink); border:2px solid var(--ikobe-pink); padding:14px 32px; font-size:16px; font-weight:600; border-radius:8px; cursor:pointer; transition:all 0.3s; font-family:inherit; }
.btn-secondary:hover { background:var(--ikobe-pink-bg); }

/* Fields grid */
.fields-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:24px 0; }
@media(max-width:600px){.fields-grid{grid-template-columns:1fr;}}
.field-card { background:white; border-radius:12px; padding:20px; border:1px solid #eee; transition:transform 0.2s,box-shadow 0.2s; }
.field-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.08); }
.field-card .card-icon { font-size:28px; margin-bottom:8px; }
.field-card .card-number { font-size:12px; color:var(--choosy-accent); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.field-card .card-title { font-weight:700; color:var(--ikobe-black); font-size:16px; margin:4px 0; }
.field-card .card-desc { font-size:13px; color:var(--ikobe-gray); line-height:1.6; }

/* Progress */
.progress-container { background:#eee; border-radius:10px; height:8px; margin:20px 0 8px; overflow:hidden; }
.progress-bar { height:100%; background:linear-gradient(90deg,var(--ikobe-pink),#b82870); border-radius:10px; transition:width 0.5s ease; }
.progress-label { display:flex; justify-content:space-between; font-size:13px; color:var(--ikobe-gray-light); margin-bottom:24px; }

/* Sticky test header */
.test-sticky-header {
  position:sticky; top:60px; z-index:50; background:var(--ikobe-white);
  padding:16px 0 0; margin:0 -40px; padding-left:40px; padding-right:40px;
  border-bottom:1px solid #eee;
}
@media(max-width:600px){.test-sticky-header{margin:0 -20px;padding-left:20px;padding-right:20px;top:56px;}}

/* Questions */
.question-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.field-badge { background:var(--choosy-accent-light); color:var(--choosy-accent-dark); padding:4px 14px; border-radius:20px; font-size:13px; font-weight:600; }
.section-title { color:var(--choosy-accent); font-size:22px; font-weight:700; margin-bottom:8px; }

/* Question items – vertical layout with slider */
.question-item { padding:20px 0; border-bottom:1px solid #f0f0f0; }
.question-item:last-child { border-bottom:none; }
.question-text { font-size:15px; color:var(--ikobe-black); line-height:1.5; margin-bottom:12px; }

/* Slider (MOBBIT-style) */
.slider-container { padding:0 4px; }
.slider-labels { display:flex; justify-content:space-between; padding:0; margin-bottom:6px; gap:4px; }
.slider-label {
  width:36px; height:36px; border-radius:50%; border:2px solid #e0e0e0;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:14px; color:var(--ikobe-gray-light);
  background:var(--ikobe-white); cursor:pointer; transition:all 0.2s ease;
  font-family:inherit; padding:0;
}
.slider-label:hover { border-color:var(--choosy-accent); background:var(--choosy-accent-light); color:var(--choosy-accent-dark); }
.slider-label.active {
  background:var(--choosy-accent); color:white; border-color:var(--choosy-accent);
  transform:scale(1.15); box-shadow:0 2px 8px rgba(3,169,244,0.35);
}
.slider-track-wrapper { position:relative; padding:12px 0; cursor:pointer; }
.slider-track {
  width:100%; height:6px; border-radius:3px; background:#e0e0e0;
  position:relative; opacity:0.4; transition:opacity 0.3s;
}
.slider-track.has-value {
  opacity:1;
  background:linear-gradient(to right,
    var(--choosy-accent) 0%,
    var(--choosy-accent) var(--slider-percent,0%),
    #e0e0e0 var(--slider-percent,0%),
    #e0e0e0 100%);
}
.slider-thumb {
  position:absolute; top:50%; width:22px; height:22px; border-radius:50%;
  background:var(--choosy-accent); border:3px solid white;
  box-shadow:0 2px 6px rgba(0,0,0,0.2); transform:translate(-50%,-50%);
  transition:left 0.15s ease; pointer-events:none;
}
.slider-descriptions { display:flex; justify-content:space-between; margin-top:4px; font-size:11px; color:var(--ikobe-gray-light); }
.slider-desc-left,.slider-desc-right { max-width:45%; }
.slider-desc-right { text-align:right; }

.scale-legend-compact {
  display:flex; justify-content:space-between; gap:4px; margin-top:8px; padding:6px 0 8px;
  font-size:11px; color:var(--ikobe-gray-light);
}
.scale-legend-compact span { text-align:center; }
.scale-legend-compact b { color:var(--choosy-accent); font-weight:700; margin-right:2px; }
@media(max-width:600px){.scale-legend-compact{font-size:10px;gap:2px;}}

.nav-buttons { display:flex; justify-content:space-between; margin-top:32px; padding-top:20px; border-top:1px solid #eee; }

/* Results */
.result-banner { text-align:center; padding:32px 20px; background:linear-gradient(135deg,var(--choosy-accent-light),#e8f5e9); border-radius:16px; margin-bottom:28px; }
.result-banner h2 { color:var(--ikobe-black); font-size:24px; margin-bottom:8px; }
.result-banner .best-path { font-size:28px; font-weight:700; color:var(--choosy-accent-dark); }
.result-banner .best-path-icon { font-size:48px; margin-bottom:8px; display:block; }
.result-banner .diff-info { font-size:14px; color:var(--ikobe-gray-light); margin-top:8px; }
.result-cards { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin:24px 0; }
@media(max-width:600px){.result-cards{grid-template-columns:1fr;}}
.result-card { border-radius:12px; padding:20px; text-align:center; border:2px solid #eee; transition:all 0.3s; }
.result-card.winner { border-color:var(--choosy-accent); background:var(--choosy-accent-light); }
.result-card .card-rank { font-size:32px; margin-bottom:4px; }
.result-card .card-path-name { font-weight:700; color:var(--ikobe-black); font-size:15px; margin-bottom:4px; }
.result-card .card-diff { font-size:24px; font-weight:700; }
.result-card .card-diff-label { font-size:12px; color:var(--ikobe-gray-light); }
.chart-container { margin:28px auto; max-width:500px; }
.chart-container canvas { width:100%!important; height:auto!important; }
.field-scores { margin:24px 0; }
.score-row { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid #f0f0f0; }
.score-row:last-child { border-bottom:none; }
.score-label { flex:1; font-size:14px; font-weight:600; color:var(--ikobe-black); }
.score-bar-bg { flex:2; height:10px; background:#eee; border-radius:6px; overflow:hidden; margin:0 12px; }
.score-bar-fill { height:100%; border-radius:6px; transition:width 0.8s ease; }
.score-value { font-weight:700; color:var(--ikobe-black); width:30px; text-align:right; }
.explanation { background:var(--ikobe-gray-bg); border-radius:12px; padding:24px; margin:24px 0; line-height:1.7; }
.explanation h3 { color:var(--choosy-accent); margin-bottom:12px; font-size:18px; }
.explanation p { margin-bottom:12px; }
.app-footer { display:flex; justify-content:space-between; padding:16px 32px; font-size:12px; color:var(--ikobe-gray-light); border-top:1px solid #eee; }

/* Weitere Angebote & About */
.angebote-section { margin:28px 0; }
.angebote-section h3 { color:var(--choosy-accent); font-size:18px; margin-bottom:12px; }
.angebote-section p { margin-bottom:12px; line-height:1.7; }
.angebote-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:16px 0; }
@media(max-width:600px){.angebote-grid{grid-template-columns:1fr;}}
.angebot-item { background:var(--ikobe-gray-bg); border-radius:10px; padding:16px; border-left:4px solid var(--choosy-accent); }
.angebot-item .angebot-name { font-weight:700; color:var(--ikobe-black); font-size:15px; margin-bottom:4px; }
.angebot-item .angebot-desc { font-size:13px; color:var(--ikobe-gray); line-height:1.5; }
.about-card { background:var(--ikobe-gray-bg); border-radius:12px; padding:24px; margin:20px 0; }
.about-card h3 { color:var(--choosy-accent); margin-bottom:10px; }
.about-card p { margin-bottom:10px; line-height:1.7; font-size:14px; }
.contact-box { background:white; border-radius:10px; padding:20px; border:1px solid #eee; margin-top:20px; }
.contact-box p { margin-bottom:6px; font-size:14px; }
.contact-box strong { color:var(--ikobe-black); }
.comparison-table { width:100%; border-collapse:collapse; margin:20px 0; font-size:14px; }
.comparison-table th { background:var(--choosy-accent-light); color:var(--choosy-accent-dark); padding:10px 12px; text-align:center; font-weight:600; }
.comparison-table th:first-child { text-align:left; }
.comparison-table td { padding:8px 12px; border-bottom:1px solid #f0f0f0; text-align:center; }
.comparison-table td:first-child { text-align:left; font-weight:600; color:var(--ikobe-black); }
.comparison-table tr:hover { background:#fafafa; }
.diff-cell { font-weight:700; }
.diff-low { color:#4caf50; }
.diff-mid { color:#ff9800; }
.diff-high { color:#f44336; }
</style>
</head>

function sumToScale(sum) {
  if (sum >= 37) return 10;
  if (sum >= 33) return 9;
  if (sum >= 29) return 8;
  if (sum >= 25) return 7;
  if (sum >= 21) return 6;
  if (sum >= 17) return 5;
  if (sum >= 13) return 4;
  if (sum >= 9)  return 3;
  if (sum >= 8)  return 2;
  return 1;
}

function renderResultsPage() {
  const scores = {};
  FIELDS.forEach(f => {
    const qs = QUESTIONS[f.id];
    let sum = 0;
    state.answers[f.id].forEach((val,i) => {
      const q = qs[i];
      if (typeof q === 'object' && q.inverted) sum += (6-val);
      else sum += val;
    });
    scores[f.id] = { sum, scale: sumToScale(sum) };
  });

  const diffs = {};
  let minDiff = Infinity, bestPath = '';
  Object.keys(PROFILES).forEach(path => {
    let total = 0;
    const fd = {};
    FIELDS.forEach(f => {
      const d = Math.abs(scores[f.id].scale - PROFILES[path][f.id]);
      fd[f.id] = d;
      total += d;
    });
    diffs[path] = { fieldDiffs:fd, totalDiff:total };
    if (total < minDiff) { minDiff = total; bestPath = path; }
  });

  const sorted = Object.keys(diffs).sort((a,b) => diffs[a].totalDiff - diffs[b].totalDiff);
  const ranks = ['\u{1F947}','\u{1F948}','\u{1F949}'];

  let resultCards = sorted.map((p,i) => {
    const info = PATH_INFO[p];
    return `<div class="result-card ${i===0?'winner':''}">
      <div class="card-rank">${ranks[i]}</div>
      <div class="card-path-name">${info.icon} ${info.name}</div>
      <div class="card-diff" style="color:${info.color}">${diffs[p].totalDiff}</div>
      <div class="card-diff-label">Differenzsumme</div>
    </div>`;
  }).join('');

  const fc = ['#f48fb1','#8bc34a','#9c27b0','#ffb74d','#29b6f6','#4db6ac','#03a9f4'];
  let scoreBars = FIELDS.map((f,i) => `<div class="score-row">
    <span class="score-label">${f.icon} ${f.name}</span>
    <div class="score-bar-bg"><div class="score-bar-fill" style="width:${scores[f.id].scale*10}%;background:${fc[i]};"></div></div>
    <span class="score-value">${scores[f.id].scale}</span>
  </div>`).join('');

  let tableRows = FIELDS.map(f => {
    let cells = sorted.map(p => {
      const d = diffs[p].fieldDiffs[f.id];
      const cls = d<=2?'diff-low':d<=4?'diff-mid':'diff-high';
      return `<td>${PROFILES[p][f.id]}</td><td class="diff-cell ${cls}">${d}</td>`;
    }).join('');
    return `<tr><td>${f.name}</td><td>${scores[f.id].scale}</td>${cells}</tr>`;
  }).join('');

  let tableHead = sorted.map(p => `<th>${PATH_INFO[p].name}<br><small>Profil</small></th><th>Diff</th>`).join('');

  return `<div class="content page">
    <div class="result-banner">
      <span class="best-path-icon">${PATH_INFO[bestPath].icon}</span>
      <h2>Endergebnis: Der Ausbildungs-Weg</h2>
      <div class="best-path">${PATH_INFO[bestPath].name}</div>
      <div class="diff-info">Die kleinste Differenzsumme markiert den Ausbildungsweg mit den gr\u00f6\u00dften Erfolgsaussichten.</div>
    </div>

    <div class="result-cards">${resultCards}</div>

    <h2 class="section-title" style="margin-top:32px;">Dein Profil: Die 7 Entscheidungsfelder</h2>
    <div class="field-scores">${scoreBars}</div>

    <h2 class="section-title" style="margin-top:32px;">Profilvergleich</h2>
    <div class="chart-container"><canvas id="radarChart" width="500" height="400"></canvas></div>

    <h2 class="section-title" style="margin-top:32px;">Detailvergleich</h2>
    <div style="overflow-x:auto;">
      <table class="comparison-table">
        <tr><th>Entscheidungsfeld</th><th>Dein Wert</th>${tableHead}</tr>
        ${tableRows}
        <tr style="font-weight:700;background:#fafafa;">
          <td>Summe der Differenzen</td><td></td>
          ${sorted.map(p=>`<td></td><td class="diff-cell" style="font-size:18px;">${diffs[p].totalDiff}</td>`).join('')}
        </tr>
      </table>
    </div>

    <div class="explanation">${EXPLANATIONS[bestPath]}</div>

    <div style="text-align:center;margin:32px 0;">
      <button class="btn-secondary" onclick="goToStart()" style="margin-right:12px;">Neuer Test</button>
      <button class="btn-secondary" onclick="goToAngebote()" style="margin-top:12px;">Weitere Angebote von IKOBE</button>
    </div>
  </div>`;
}

function drawRadarChart() {
  const canvas = document.getElementById('radarChart');

  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2-10;
  const R = Math.min(W,H)*0.38, n=7;
  const labels = FIELDS.map(f=>f.name);

  const scores = {};
  FIELDS.forEach(f => {
    const qs = QUESTIONS[f.id];
    let sum = 0;
    state.answers[f.id].forEach((v,i) => {
      const q = qs[i];
      if(typeof q==='object'&&q.inverted) sum+=(6-v); else sum+=v;
    });
    scores[f.id] = sumToScale(sum);
  });

  function ang(i){return(Math.PI*2*i/n)-Math.PI/2;}
  function pt(i,v){const a=ang(i),r=(v/10)*R;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}

  ctx.clearRect(0,0,W,H);
  for(let l=2;l<=10;l+=2){
    ctx.beginPath();
    for(let i=0;i<=n;i++){const[x,y]=pt(i%n,l);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;ctx.stroke();
    const[lx,ly]=pt(0,l);ctx.fillStyle='#bbb';ctx.font='11px Open Sans';ctx.fillText(l,lx+4,ly-4);
  }
  for(let i=0;i<n;i++){
    const[x,y]=pt(i,10);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.strokeStyle='#e0e0e0';ctx.stroke();
    const[lx,ly]=pt(i,11.5);ctx.fillStyle='#555';ctx.font='12px Open Sans';ctx.textAlign='center';ctx.fillText(labels[i],lx,ly+4);
  }

  function drawP(data,color,alpha,dash){
    ctx.beginPath();
    for(let i=0;i<=n;i++){const fid=FIELDS[i%n].id;const v=data[fid];const[x,y]=pt(i%n,v);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.closePath();ctx.fillStyle=color.replace(')',`,${alpha})`).replace('rgb','rgba');ctx.fill();
    ctx.strokeStyle=color;ctx.lineWidth=2;if(dash)ctx.setLineDash([6,3]);else ctx.setLineDash([]);ctx.stroke();ctx.setLineDash([]);
  }

  const up={};FIELDS.forEach(f=>{up[f.id]=scores[f.id];});
  drawP(up,'rgb(3,169,244)',0.15,false);
  drawP(PROFILES.berufsausbildung,'rgb(76,175,80)',0.05,true);
  drawP(PROFILES.duales_studium,'rgb(255,152,0)',0.05,true);
  drawP(PROFILES.universitaetsstudium,'rgb(33,150,243)',0.05,true);

  for(let i=0;i<n;i++){
    const[x,y]=pt(i,scores[FIELDS[i].id]);
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle='#03a9f4';ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();
  }

  const ly2=H-30;
  [{l:'Dein Profil',c:'#03a9f4',d:false},{l:'Berufsausb.',c:'#4caf50',d:true},{l:'Duales St.',c:'#ff9800',d:true},{l:'Uni-Studium',c:'#2196f3',d:true}].reduce((lx,it)=>{
    ctx.beginPath();ctx.moveTo(lx,ly2);ctx.lineTo(lx+24,ly2);ctx.strokeStyle=it.c;ctx.lineWidth=3;
    if(it.d)ctx.setLineDash([4,3]);else ctx.setLineDash([]);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#555';ctx.font='11px Open Sans';ctx.textAlign='left';ctx.fillText(it.l,lx+28,ly2+4);
    return lx+110;
  },60);
}

function goToStart(){state.page='start';state.currentField=0;FIELDS.forEach(f=>{state.answers[f.id]=new Array(8).fill(0);});render();window.scrollTo(0,0);}
function goToFields(){state.page='fields';render();window.scrollTo(0,0);}
function startTest(){state.page='test';state.currentField=0;render();window.scrollTo(0,0);}
function trackClick(event,qi){
  const rect=event.currentTarget.getBoundingClientRect();
  const x=event.clientX-rect.left;
  const pct=x/rect.width;
  const val=Math.min(5,Math.max(1,Math.round(pct*4+1)));
  setAnswer(qi,val);
}
function setAnswer(qi,v){
  state.answers[FIELDS[state.currentField].id][qi]=v;
  // Update only the affected slider (no full re-render)
  const items=document.querySelectorAll('.question-item');
  if(items[qi]){
    const pct=((v-1)/4)*100;
    // Update circle labels
    items[qi].querySelectorAll('.slider-label').forEach((btn,idx)=>{
      btn.classList.toggle('active',(idx+1)===v);
    });
    // Update track
    const track=items[qi].querySelector('.slider-track');
    if(track){
      track.classList.add('has-value');
      track.style.setProperty('--slider-percent',pct+'%');
      let thumb=track.querySelector('.slider-thumb');
      if(!thumb){thumb=document.createElement('div');thumb.className='slider-thumb';track.appendChild(thumb);}
      thumb.style.left=pct+'%';
    }
  }
  // Update progress bar and label
  const answers=state.answers[FIELDS[state.currentField].id];
  const answeredBefore=state.currentField*8;
  const answeredThisField=answers.filter(a=>a>0).length;
  const totalAnswered=answeredBefore+answeredThisField;
  const progress=Math.round((totalAnswered/56)*100);
  const pBar=document.querySelector('.progress-bar');
  if(pBar)pBar.style.width=progress+'%';
  const pLabels=document.querySelectorAll('.progress-label span');
  if(pLabels[1])pLabels[1].textContent=totalAnswered+' / 56 Fragen';
  // Update nav button state
  const allAnswered=answers.every(a=>a>0);
  const navBtns=document.querySelectorAll('.nav-buttons button');
  const fwdBtn=navBtns[navBtns.length-1];
  if(fwdBtn){
    if(allAnswered){fwdBtn.disabled=false;fwdBtn.style.opacity='1';fwdBtn.style.cursor='pointer';}
    else{fwdBtn.disabled=true;fwdBtn.style.opacity='0.5';fwdBtn.style.cursor='default';}
  }
}
function nextField(){if(state.currentField<6){state.currentField++;state.page='test';render();window.scrollTo(0,0);}}
function prevField(){if(state.currentField>0){state.currentField--;render();window.scrollTo(0,0);}else goToFields();}
function showResults(){state.page='results';render();window.scrollTo(0,0);}
function goToAngebote(){state.page='angebote';render();window.scrollTo(0,0);}


render();
</script>
