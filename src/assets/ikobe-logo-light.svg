<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none">
  <!-- IKOBE Logo – Light version (dark text on transparent/white background) -->
  <!-- 7 colored bars in 2 groups with gap -->

  <!-- Group 1: bars 1-3 -->
  <rect x="0" y="24" width="14" height="76" rx="2" fill="#f48fb1"/>   <!-- rosa/salmon -->
  <rect x="18" y="15" width="14" height="85" rx="2" fill="#8bc34a"/>  <!-- lime-grün -->
  <rect x="36" y="38" width="11" height="62" rx="2" fill="#9c27b0"/>  <!-- lila/magenta -->

  <!-- Gap (~12px) -->

  <!-- Group 2: bars 4-6 -->
  <rect x="59" y="18" width="14" height="82" rx="2" fill="#ffb74d"/>  <!-- orange/gold -->
  <rect x="77" y="0" width="14" height="100" rx="2" fill="#29b6f6"/>  <!-- hellblau/cyan (tallest) -->
  <rect x="95" y="12" width="14" height="88" rx="2" fill="#4db6ac"/>  <!-- türkis/mint -->

  <!-- Transition dark bars (blending into IKOBE lettering) -->
  <rect x="113" y="5" width="10" height="95" rx="1" fill="#2a2a2a"/>
  <rect x="127" y="22" width="10" height="78" rx="1" fill="#2a2a2a"/>

  <!-- IKOBE text -->
  <text x="140" y="92" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="105" letter-spacing="-2" fill="#1a1a1a">IKOB</text>

  <!-- Epsilon (ε) as the distinctive E -->
  <text x="430" y="92" font-family="'Georgia', 'Times New Roman', serif" font-weight="400" font-size="110" fill="#1a1a1a">ε</text>

  <!-- Subtitle -->
  <text x="140" y="115" font-family="'Open Sans', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="22" fill="#333333">Institut für Kompetenz und Begabung</text>
</svg>
